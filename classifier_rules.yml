rules:
  # Order matters — first match wins. Put SPECIFIC pipeline-stage failures
  # before generic language-level errors (java.lang.*, Exception) which can
  # appear incidentally (NewRelic NRQL refs, etc.).

  - class: compliance
    patterns:
      - 'Signed Off commit id'
      - 'Compliance:'
      - 'COMMIT_ID.*does not match'
      - 'sign.?off.*missing'
    description: "Compliance check failure — Jira sign-off / commit ID mismatch"

  - class: canary_script_error
    patterns:
      - 'Traceback \(most recent call last\):[\s\S]*?canary\.py'
      - 'canary\.py", line \d+, in'
      - "TypeError.*round.*NoneType"
      - 'KeyError.*canary'
    description: "canary.py Python script crashed (NOT a service regression). Usually means NewRelic has no baseline data for the app, or canary.py has a defensive-code gap."

  - class: canary_fail
    patterns:
      - 'Rollout back as Canary failed'
      - 'Rolling Back as Result !=0'
      - 'Canary Failed'
      - 'Canary run failed for canary run id'
      - '"canary_run_status":\s*"Fail"'
    description: "Canary analysis failed — Kayenta canary config did not pass threshold"

  # terraform MUST come before aws_limit — Terraform state/lock errors
  # often contain AWS-API capacity strings in their body, and aws_limit
  # would otherwise eat them. State + lock errors are operator-action
  # (devops state surgery), distinct from a pure AWS quota bump.
  - class: terraform
    patterns:
      - 'Terraform state contains resources'
      - 'Stopping pipeline execution due to non-empty Terraform state'
      - 'Error acquiring the state lock'
      - 'ConditionalCheckFailedException.*conditional request failed'
      - 'Error: configuring Terraform AWS Provider'
      - 'Error: BucketRegionError'
      - 'Error: Provider produced inconsistent final plan'
      - 'Inconsistent dependency lock file'
      - 'Error: Failed to install provider'
      - 'Error: Backend initialization required'
      - 'terraform.*Error: error inspecting states'
    description: "Terraform state / lock / apply / backend failure — see TerraformTroubleshoot.md"

  - class: aws_limit
    patterns:
      - 'TooMany[A-Z][a-zA-Z]+'
      - 'LimitExceeded'
      - 'QuotaExceeded'
      - 'ResourceLimitExceeded'
      - 'maximum number of'
    description: "AWS service limit hit — bump quota or clean up unused resources"

  - class: parse_error
    patterns:
      - 'parse error:'
      - 'Invalid numeric literal'
      - 'jq: error'
      - 'Unexpected token'
    description: "jq/JSON parse failure in config.json — check config.json for malformed numeric fields"

  # health_check MUST come before java_runtime — ALB target group probe
  # failures are pipeline-level failures specific to deploy/rollout, while
  # java_runtime is a generic catch-all that can fire on stray references.
  - class: health_check
    patterns:
      - 'Health Status failed to move to healthy'
      - 'iterations:\s*unhealthy'
      - 'Error in Deploy_i-'
      - 'health.*fail'
      - 'healthz.*[45][0-9][0-9]'
      - 'curl.*Connection refused'
      - 'supervisorctl.*FATAL'
    description: "Service health check failed post-deploy — ALB target group never reached healthy threshold"

  - class: java_runtime
    # Require BOTH a java class name AND exception/error context to avoid
    # false-matching on NewRelic NRQL or log lines that just reference
    # java.lang.* in passing. Note: bare `OutOfMemoryError` was removed —
    # it falsely matched `-XX:+HeapDumpOnOutOfMemoryError` JVM startup
    # flags in config.json dumps. Sanitizer now strips those lines, but
    # we keep the pattern strict here as defense-in-depth.
    #
    # Groovy DSL / Jenkins pipeline script exceptions are also routed here
    # — they're JVM-level method-resolution / type errors raised at the same
    # layer as java.lang.* and benefit from the same "read the stack trace,
    # cite the file:line" treatment. Without this, the classifier returned
    # `unknown` for Groovy MissingMethodException and the LLM drifted into
    # an `scm` narrative because of a `release/REQ-...` branch name.
    patterns:
      - 'java\.lang\.\S+Exception'
      - 'java\.lang\.\S+Error'
      - 'Exception in thread "[^"]+"'
      - 'java\.lang\.OutOfMemoryError'
      - 'java\.lang\.StackOverflowError'
      - 'groovy\.lang\.\S+Exception'
      - 'No signature of method:'
      - 'unable to resolve class'
    description: "Java/Groovy runtime exception — read the stack trace, cite the file:line"

  - class: ssm
    patterns:
      - 'SSM command failed'
      - 'ssm:SendCommand'
      - 'Failed to execute SSH'
    description: "SSM command execution failure"

  - class: scm
    patterns:
      - 'git fetch failed'
      - 'Could not read from remote'
      - 'Authentication failed.*github'
      - 'fatal: repository'
    description: "Git/SCM failure — likely PAT expired or repo access issue"

  - class: network
    patterns:
      - 'Connection refused'
      - 'Connection timed out'
      - 'No route to host'
      - 'UnknownHostException'
    description: "Network connectivity failure"

  - class: dependency
    patterns:
      - 'Could not resolve'
      - 'BUILD FAILED.*dependencies'
      - 'Download failed'
      - 'artifact not found'
    description: "Build dependency resolution failure"

  - class: timeout
    patterns:
      - 'Timeout waiting'
      - 'timed out after'
      - 'deadline exceeded'
    description: "Operation timeout"

  - class: unknown
    patterns: []
    description: "Could not classify — send full log window to Claude"
